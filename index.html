<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masters Live Pool Tracker 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --masters-green: #006747; --masters-yellow: #ffcc00; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(0, 103, 71, 0.9), rgba(0, 103, 71, 0.9)),
                        url('https://images.unsplash.com/photo-1587174486073-ae5e5cff23aa?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80');
            background-size: cover; background-attachment: fixed; background-position: center;
        }
        h1, h2 { font-family: 'Playfair Display', serif; }
        .score-under  { color: #d91e18; font-weight: 800; }
        .score-even   { color: #27ae60; font-weight: 800; }
        .score-over   { color: #2c3e50; font-weight: 800; }
        .masters-card { background: rgba(255,255,255,0.95); border-radius: 2px; border-top: 6px solid var(--masters-yellow); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .leaderboard-header { background-color: var(--masters-green); color: white; padding: 1rem; border-bottom: 3px solid var(--masters-yellow); }
        .rank-badge { background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 900; margin-right: 10px; border: 1px solid rgba(255,255,255,0.3); }
        .cap-badge  { background: var(--masters-yellow); color: var(--masters-green); font-weight: 900; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; text-transform: uppercase; }
        .wd-badge   { background: #ccc; color: #333; font-weight: 900; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; text-transform: uppercase; }
        .loading-spinner { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid var(--masters-yellow); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
<div class="max-w-6xl mx-auto">

    <header class="text-center mb-10">
        <div class="flex justify-center mb-6">
            <div class="bg-white p-2 rounded-lg shadow-2xl">
                <img src="https://i0.wp.com/huskybulletin.com/wp-content/uploads/2025/04/masters-emblem.png?fit=1200%2C675&ssl=1"
                     alt="Masters Logo" class="h-24 md:h-32 w-auto object-contain">
            </div>
        </div>
        <h1 class="text-4xl md:text-6xl text-white drop-shadow-lg mb-2 uppercase tracking-tight">Masters Pool 2026</h1>
        <div id="cut-line-display" class="bg-yellow-400 text-green-900 px-6 py-1 rounded-full font-black inline-block shadow-lg uppercase tracking-widest text-sm">
            Fetching Scores...
        </div>
        <p id="last-updated" class="text-green-100 text-sm mt-4 flex justify-center items-center gap-2 italic">Live Sync Active</p>
    </header>

    <div class="max-w-md mx-auto mb-10 bg-white/10 backdrop-blur-md p-3 rounded text-white text-xs flex justify-around border border-white/20">
        <span><strong class="text-red-400">•</strong> Under Par</span>
        <span><span class="cap-badge">CAP</span> Made-cut player capped at cut line</span>
        <span><em>Italic</em> = Missed Cut</span>
    </div>

    <div id="teams-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRNUYd3Yuvmvt0Uc9Ov54IguAwMgXPehvt7tjDBUonuQpKu1e6zmQNWDdGMCSWfU8zslFHi90T7AEzc/pub?gid=0&single=true&output=csv';
const API_URL       = 'https://site.web.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga&tournamentId=401811941';

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function fmtScore(n) {
    if (n === 0) return 'E';
    return n > 0 ? '+' + n : String(n);
}

function getOrdinal(n) {
    const s = ['th','st','nd','rd'], v = n % 100;
    return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

function parseScore(val) {
    if (val === null || val === undefined) return null;
    const s = val.toString().trim().toUpperCase();
    if (s === '' || s === '-' || s === 'E' || s === 'EVEN') return 0;
    const n = parseInt(s.replace('+', ''), 10);
    return isNaN(n) ? null : n;
}

function extractToPar(c) {
    if (Array.isArray(c.statistics)) {
        for (const s of c.statistics) {
            if (s.name === 'toPar' || s.name === 'scoreToPar' || s.abbreviation === 'TO PAR') {
                const v = parseScore(s.displayValue);
                if (v !== null) return v;
            }
        }
    }
    if (Array.isArray(c.linescores) && c.linescores.length > 0) {
        const last = c.linescores[c.linescores.length - 1];
        if (typeof last.value === 'number' && Math.abs(last.value) <= 30) return last.value;
    }
    const raw = c.score?.displayValue ?? c.score ?? null;
    const v = parseScore(raw);
    if (v !== null) return v;

    return 0; 
}

function isMissedCut(c) {
    const id   = c.status?.id;
    const name = (c.status?.type?.name || '').toUpperCase();
    return id === '3' || name === 'STATUS_CUT' || name === 'STATUS_MISSED_CUT';
}

function isWithdrawn(c) {
    const id   = c.status?.id;
    const name = (c.status?.type?.name || '').toUpperCase();
    return id === '4' || name === 'STATUS_WITHDRAWN' || name === 'STATUS_WD' || name === 'STATUS_DQ';
}

// ─── CUT LINE (FIXED) ────────────────────────────────────────────────────────
function deriveCutLine(competition, competitors) {
    // A — Explicit cutLine field from ESPN API
    if (competition.cutLine !== undefined && competition.cutLine !== null) {
        const v = parseScore(competition.cutLine);
        if (v !== null) return v;
    }

    // B — Safely parse notes (avoid matching generic rules like "Top 50")
    const notes = competition.notes || [];
    for (const note of notes) {
        const text = (note.text || '').toUpperCase();
        if (text.includes('CUT')) {
            // Only match literal score indicators tied to the word cut
            const match = text.match(/(?:CUT.*?)([+-]\d+|E|EVEN)\b/);
            if (match) {
                const v = parseScore(match[1]);
                if (v !== null) return v;
            }
        }
    }

    // C — Derive firmly from player statuses (Air-tight weekend fallback)
    const cutPlayers = competitors.filter(c => isMissedCut(c));
    
    // If no players are officially marked as CUT yet, the cut is TBD.
    if (cutPlayers.length === 0) return null;

    // By rule, the true cut line is always exactly 1 stroke better than 
    // the absolute best score among those who missed the cut.
    // (We do not derive from active players to avoid weekend score inflation).
    const cutScores = cutPlayers.map(c => extractToPar(c)).filter(s => s !== null);
    if (cutScores.length > 0) {
        const bestMissed = Math.min(...cutScores);
        return bestMissed - 1; 
    }

    return null;
}

// ─── NAME MATCHING ───────────────────────────────────────────────────────────
function matchGolfer(sheetName, competitors) {
    const cleaned      = sheetName.toLowerCase().replace(/\s+/g, '');
    const sheetLast    = sheetName.trim().split(/\s+/).pop().toLowerCase();
    const sheetFirst   = sheetName.trim().split(/\s+/)[0].toLowerCase();

    return competitors.find(c => {
        const espnDisplay = (c.athlete?.displayName || '').toLowerCase();
        const espnCleaned = espnDisplay.replace(/\s+/g, '');
        const espnLast    = (c.athlete?.lastName  || '').toLowerCase().trim();
        const espnFirst   = (c.athlete?.firstName || '').toLowerCase().trim();

        if (espnCleaned === cleaned) return true;
        if (cleaned.length > 5 && espnCleaned.includes(cleaned)) return true;
        if (sheetLast.length > 3 && sheetLast === espnLast) {
            if (sheetFirst[0] === espnFirst[0]) return true;
        }
        return false;
    });
}

// ─── DATA FETCHING ───────────────────────────────────────────────────────────
async function fetchTeams() {
    const res  = await fetch(SHEET_CSV_URL);
    const text = await res.text();
    const rows = text.split(/\r?\n/).map(line =>
        line.split(',').map(v => v.replace(/^"|"$/g, '').trim())
    );
    return rows
        .filter(r => r.length > 1 && r[0] && !r[0].toLowerCase().startsWith('team'))
        .map(r => ({ owner: r[0], golfers: r.slice(1, 10).filter(Boolean) }));
}

// ─── MAIN UPDATE LOOP ────────────────────────────────────────────────────────
async function updateScores() {
    const statusEl   = document.getElementById('last-updated');
    const cutEl      = document.getElementById('cut-line-display');
    const container  = document.getElementById('teams-container');

    statusEl.innerHTML = '<div class="loading-spinner mr-2"></div> Updating Scores...';

    let poolTeams;
    try {
        poolTeams = await fetchTeams();
    } catch (e) {
        statusEl.innerText = 'Error: Could not load Google Sheet.';
        console.error('[SHEET]', e);
        return;
    }
    if (!poolTeams.length) {
        statusEl.innerText = 'Error: Sheet returned no teams.';
        return;
    }

    let competitors, competition, event;
    try {
        const res  = await fetch(API_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        if (!data.events?.length) throw new Error('No events in ESPN response.');

        event       = data.events.find(e => e.name?.toLowerCase().includes('masters')) || data.events[0];
        competition = event.competitions[0];
        competitors = competition.competitors;
    } catch (e) {
        statusEl.innerText = 'Sync Error — check console for details.';
        console.error('[ESPN]', e);
        return;
    }

    const cutLine    = deriveCutLine(competition, competitors);
    const cutDisplay = cutLine === null ? 'Cut TBD' : `Cut: ${fmtScore(cutLine)}`;
    cutEl.innerText  = `${event.shortName || event.name} | ${cutDisplay}`;

    const teamResults = poolTeams.map(team => {
        let teamTotal = 0;

        const players = team.golfers.map(name => {
            const c = matchGolfer(name, competitors);

            let rawScore    = 0;
            let missedCut   = false;
            let withdrawn   = false;
            let displayName = name;

            if (c) {
                displayName = c.athlete?.displayName || name;
                rawScore    = extractToPar(c);
                missedCut   = isMissedCut(c);
                withdrawn   = isWithdrawn(c);
            } 

            // Capping logic (now perfectly functional due to the fixed cutLine variable)
            let poolScore  = rawScore;
            let appliedCap = false;

            if (!missedCut && !withdrawn && cutLine !== null && rawScore > cutLine) {
                poolScore  = cutLine;
                appliedCap = true;
            }

            teamTotal += poolScore;
            return { displayName, rawScore, poolScore, appliedCap, missedCut, withdrawn, found: !!c };
        });

        return { owner: team.owner, total: teamTotal, players };
    });

    teamResults.sort((a, b) => a.total - b.total);
    let rankCounter = 1;
    teamResults.forEach((team, i) => {
        if (i > 0 && team.total > teamResults[i - 1].total) rankCounter = i + 1;
        const tied = (i > 0 && team.total === teamResults[i - 1].total) ||
                     (i < teamResults.length - 1 && team.total === teamResults[i + 1].total);
        team.rankDisplay = (tied ? 'T' : '') + getOrdinal(rankCounter);
    });

    container.innerHTML = '';
    teamResults.forEach(team => {
        const card = document.createElement('div');
        card.className = 'masters-card overflow-hidden';

        const totalClass = team.total < 0 ? 'text-red-400' : 'text-white';

        let html = `
            <div class="leaderboard-header flex justify-between items-center">
                <div class="flex items-center">
                    <span class="rank-badge">${team.rankDisplay}</span>
                    <h2 class="text-xl leading-tight">${team.owner}</h2>
                </div>
                <div class="text-right">
                    <span class="text-3xl font-black ${totalClass}">${fmtScore(team.total)}</span>
                </div>
            </div>
            <div class="p-4 bg-white">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-left text-gray-400 border-b text-[10px] uppercase font-bold tracking-widest">
                            <th class="pb-2">Golfer</th>
                            <th class="pb-2 text-right">Actual</th>
                            <th class="pb-2 text-right">Pool</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

        team.players.forEach(p => {
            const scoreClass = p.poolScore < 0 ? 'score-under' : (p.poolScore === 0 ? 'score-even' : 'score-over');
            const nameClass  = (p.missedCut || p.withdrawn) ? 'italic text-gray-400' : 'text-gray-700';
            const noMatch    = !p.found ? '<span class="text-red-300 text-[10px] ml-1">(no match)</span>' : '';
            const capBadge   = p.appliedCap ? '<span class="cap-badge ml-1">Cap</span>' : '';
            const wdBadge    = p.withdrawn  ? '<span class="wd-badge ml-1">WD</span>'  : '';

            html += `
                <tr class="border-b border-gray-50 last:border-0">
                    <td class="py-2 font-medium ${nameClass}">${p.displayName}${capBadge}${wdBadge}${noMatch}</td>
                    <td class="text-right text-gray-400 text-xs">${fmtScore(p.rawScore)}</td>
                    <td class="text-right ${scoreClass} text-base">${fmtScore(p.poolScore)}</td>
                </tr>
            `;
        });

        html += `</tbody></table></div>`;
        card.innerHTML = html;
        container.appendChild(card);
    });

    statusEl.innerText = `Last Refreshed: ${new Date().toLocaleTimeString()}`;
}

// ─── INIT ────────────────────────────────────────────────────────────────────
updateScores();
setInterval(updateScores, 60000); 
</script>
</body>
</html>
