<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masters Live Pool Tracker 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --masters-green: #006747; --masters-yellow: #ffcc00; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(0, 103, 71, 0.9), rgba(0, 103, 71, 0.9)), 
                        url('https://images.unsplash.com/photo-1587174486073-ae5e5cff23aa?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80');
            background-size: cover; background-attachment: fixed; background-position: center;
        }
        h1, h2 { font-family: 'Playfair Display', serif; }
        .score-under { color: #d91e18; font-weight: 800; }
        .score-even { color: #27ae60; font-weight: 800; }
        .score-over { color: #2c3e50; font-weight: 800; }
        .masters-card { background: rgba(255, 255, 255, 0.95); border-radius: 2px; border-top: 6px solid var(--masters-yellow); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .leaderboard-header { background-color: var(--masters-green); color: white; padding: 1rem; border-bottom: 3px solid var(--masters-yellow); }
        .rank-badge { background: rgba(255, 255, 255, 0.2); padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 900; margin-right: 10px; border: 1px solid rgba(255, 255, 255, 0.3); }
        .cut-badge { background: var(--masters-yellow); color: var(--masters-green); font-weight: 900; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; text-transform: uppercase; }
        .loading-spinner { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid var(--masters-yellow); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <div class="flex justify-center mb-6">
                <div class="bg-white p-2 rounded-lg shadow-2xl">
                    <img src="https://i0.wp.com/huskybulletin.com/wp-content/uploads/2025/04/masters-emblem.png?fit=1200%2C675&ssl=1" 
                         alt="Masters Logo" class="h-24 md:h-32 w-auto object-contain">
                </div>
            </div>
            <h1 class="text-4xl md:text-6xl text-white drop-shadow-lg mb-2 uppercase tracking-tight">Masters Pool 2026</h1>
            <div id="cut-line-display" class="bg-yellow-400 text-green-900 px-6 py-1 rounded-full font-black inline-block shadow-lg uppercase tracking-widest text-sm">
                Fetching Tournament Data...
            </div>
            <p id="last-updated" class="text-green-100 text-sm mt-4 flex justify-center items-center gap-2 italic">Syncing scores...</p>
        </header>

        <div id="legend-bar" class="max-w-md mx-auto mb-10 bg-white/10 backdrop-blur-md p-3 rounded text-white text-xs flex justify-around border border-white/20">
            <span><strong class="text-yellow-400">•</strong> Under Par (Red)</span>
            <span><strong class="text-blue-300">•</strong> Cut Cap Applied</span>
            <span><strong class="italic text-white">•</strong> Missed Cut</span>
        </div>

        <div id="teams-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRNUYd3Yuvmvt0Uc9Ov54IguAwMgXPehvt7tjDBUonuQpKu1e6zmQNWDdGMCSWfU8zslFHi90T7AEzc/pub?gid=0&single=true&output=csv';
        // ESPN PGA Leaderboard API
        const API_URL = "https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga";

        function getOrdinal(n) {
            let s = ["th", "st", "nd", "rd"], v = n % 100;
            return n + (s[(v - 20) % 10] || s[v] || s[0]);
        }

        async function fetchTeams() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const text = await response.text();
                const rows = text.split(/\r?\n/).map(line => line.split(',').map(v => v.replace(/^"|"$/g, '').trim()));
                const filtered = rows.filter(r => r.length > 1 && r[0] !== "" && !r[0].toLowerCase().includes("team"));
                return filtered.map(r => ({ owner: r[0], golfers: r.slice(1, 10) }));
            } catch (e) { return []; }
        }

        async function updateScores() {
            const statusEl = document.getElementById('last-updated');
            statusEl.innerHTML = '<div class="loading-spinner"></div> Refreshing Leaderboard...';

            const poolTeams = await fetchTeams();
            if (poolTeams.length === 0) { statusEl.innerText = "Error loading Google Sheet."; return; }

            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // Find the Masters in the event list (or default to the first PGA event)
                const event = data.events.find(e => e.name.toLowerCase().includes("masters")) || data.events[0];
                const competitors = event.competitions[0].competitors;
                
                // Attempt to find cut line from status
                let cutLine = 0;
                const statusNotes = event.competitions[0].notes || [];
                const cutNote = statusNotes.find(n => n.type === "cutline");
                if (cutNote) {
                    cutLine = parseInt(cutNote.text.replace(/[^0-9-]/g, '')) || 0;
                } else {
                    // Fallback: If no cut note, try to estimate by looking at the 50th player
                    const p50 = competitors[49];
                    if (p50) cutLine = parseInt(p50.score) || 0;
                }

                document.getElementById('cut-line-display').innerText = `Tournament: ${event.shortName} | Cut: ${cutLine > 0 ? '+' + cutLine : (cutLine === 0 ? 'E' : cutLine)}`;

                const teamResults = poolTeams.map(team => {
                    let teamTotal = 0;
                    let playerDetails = team.golfers.map(name => {
                        const p = competitors.find(c => c.athlete.displayName.toLowerCase().replace(/\s/g, '').includes(name.toLowerCase().replace(/\s/g, ''))) 
                                  || { score: 0, athlete: { displayName: name }, status: { type: 'active' }, curScore: 0 };
                        
                        // ESPN provides score as "E", "-5", "+3" etc
                        let rawScore = 0;
                        if (p.score === "E") rawScore = 0;
                        else if (typeof p.score === "string") rawScore = parseInt(p.score.replace('+', '')) || 0;
                        else rawScore = parseInt(p.score) || 0;

                        const missedCut = p.status?.type === 'cut' || p.status?.id === '3';
                        let displayScore = rawScore;
                        let appliedCap = false;

                        // CAP RULE: If they made the cut but performed worse than the cut line
                        if (!missedCut && rawScore > cutLine) {
                            displayScore = cutLine;
                            appliedCap = true;
                        }

                        teamTotal += displayScore;
                        return { name: p.athlete.displayName, raw: rawScore, pool: displayScore, appliedCap, missedCut };
                    });
                    return { ...team, total: teamTotal, players: playerDetails };
                });

                // Ranking Logic
                teamResults.sort((a, b) => a.total - b.total);
                let currentRank = 1;
                teamResults.forEach((team, i) => {
                    if (i > 0 && team.total > teamResults[i-1].total) currentRank = i + 1;
                    const isTie = (i > 0 && team.total === teamResults[i-1].total) || (i < teamResults.length-1 && team.total === teamResults[i+1].total);
                    team.rankDisplay = (isTie ? "T" : "") + getOrdinal(currentRank);
                });

                const container = document.getElementById('teams-container');
                container.innerHTML = '';
                teamResults.forEach(team => {
                    const card = document.createElement('div');
                    card.className = 'masters-card overflow-hidden mb-4';
                    let html = `
                        <div class="leaderboard-header flex justify-between items-center">
                            <div class="flex items-center"><span class="rank-badge">${team.rankDisplay}</span><h2 class="text-xl leading-tight">${team.owner}</h2></div>
                            <div class="text-right"><span class="text-3xl font-black ${team.total < 0 ? 'text-red-400' : 'text-white'}">${team.total > 0 ? '+' + team.total : (team.total === 0 ? 'E' : team.total)}</span></div>
                        </div>
                        <div class="p-4 bg-white"><table class="w-full text-sm">
                            <tr class="text-left text-gray-400 border-b text-[10px] uppercase font-bold tracking-widest"><th class="pb-2">Golfer</th><th class="pb-2 text-right">Actual</th><th class="pb-2 text-right">Pool</th></tr>
                    `;
                    team.players.forEach(p => {
                        const scoreClass = p.pool < 0 ? 'score-under' : (p.pool === 0 ? 'score-even' : 'score-over');
                        html += `
                            <tr class="border-b border-gray-50 last:border-0">
                                <td class="py-2 font-medium ${p.missedCut ? 'italic text-gray-700' : 'text-gray-700'}">${p.name} ${p.appliedCap ? '<span class="cut-badge ml-1">Cap</span>' : ''}</td>
                                <td class="text-right text-gray-400 text-xs">${p.raw > 0 ? '+' + p.raw : (p.raw === 0 ? 'E' : p.raw)}</td>
                                <td class="text-right ${scoreClass} text-base">${p.pool > 0 ? '+' + p.pool : (p.pool === 0 ? 'E' : p.pool)}</td>
                            </tr>
                        `;
                    });
                    card.innerHTML = html + `</table></div>`;
                    container.appendChild(card);
                });
                statusEl.innerText = `Last Refreshed: ${new Date().toLocaleTimeString()}`;
            } catch (error) { 
                console.error(error);
                statusEl.innerText = "Error syncing with ESPN. Retrying..."; 
            }
        }

        updateScores();
        setInterval(updateScores, 60000);
    </script>
</body>
</html>
